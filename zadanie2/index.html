<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Задание 2 — Лесной ролик</title>
  <!-- Кнопка "Вернуться на сайт" -->
  <style>
    .back-button {
      display: block;
      margin: 20px auto;
      padding: 12px 24px;
      background: #2e7d32;
      color: white;
      text-decoration: none;
      font-weight: 700;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      transition: background 0.3s ease;
    }
    .back-button:hover {
      background: #1b5e20;
    }
  </style>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Кнопка возврата на главную -->
  <a href="../index.html" class="back-button">← Вернуться на сайт</a>

  <!-- Заголовок с именем студента -->
  <header style="text-align: center; padding: 15px; background: #006064; color: white;">
    Костин Даниил, группа з5130903/30301
  </header>

  <!-- Основной контент — анимированный ролик -->
  <main>
    <div class="scene" id="scene">
      <!-- Фон — elka1.png -->
      <div class="background"></div>

      <!-- Облака — плавают при наведении -->
      <div class="cloud cloud1"></div>
      <div class="cloud cloud2"></div>

      <!-- Ель — качается при наведении -->
      <div class="tree"></div>

      <!-- Лиса — появляется при наведении и бежит к елке -->
      <div class="fox"></div>

      <!-- Солнце — появляется при нажатии -->
      <div class="sun"></div>

      <!-- Надписи -->
      <div class="label label-hover">Санаторий "Родные просторы"</div>
      <div class="label label-active">Лучший отдых</div>
    </div>
  </main>

  <!-- Подвал -->
  <footer style="text-align: center; padding: 10px; background: #004d40; color: white;">
    © 2026 Задание 2 — Лесной ролик | Создано для курса «Верстка и прототипирование сайтов»
  </footer>
</body>
</html>
