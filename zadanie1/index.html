<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Задание 1 — Аквариум</title>
  <style>
    .back-button {
      display: block;
      margin: 20px auto;
      padding: 12px 24px;
      background: #2e7d32;
      color: white;
      text-decoration: none;
      font-weight: 700;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      transition: background 0.3s ease;
    }
    .back-button:hover {
      background: #1b5e20;
    }
  </style>
  <link rel="stylesheet" href="pic.css" />
</head>
<body>
  <a href="../index.html" class="back-button">← Вернуться на сайт</a>
  <header style="text-align: center; padding: 15px; background: #006064; color: white;">
    Костин Даниил, группа з5130903/30301
  </header>
  <main>
    <div class="aquarium" id="aquarium">
      <div class="grass1">
        <div class="green"></div>
        <div class="white"></div>
      </div>
      <div class="grass2">
        <div class="green"></div>
        <div class="white"></div>
      </div>
      <div class="grass3">
        <div class="green"></div>
        <div class="white"></div>
      </div>
      <div class="fish1">
        <div class="body"></div>
        <div class="tail"></div>
        <div class="eye"></div>
        <div class="circle-pattern" style="top: 3%; border-color: hsl(323, 100%, 50%)"></div>
        <div class="circle-pattern" style="top: 34%; border-color: hsl(323, 100%, 50%)"></div>
        <div class="circle-pattern" style="top: 64%; border-color: hsl(323, 100%, 50%)"></div>
        <div class="circle-pattern circle-big" style="border-color: hsl(323, 100%, 50%)"></div>
      </div>
      <div class="fish2">
        <div class="body"></div>
        <div class="tail"></div>
        <div class="eye"></div>
        <div class="circle-pattern" style="top: 3%"></div>
        <div class="circle-pattern" style="top: 34%"></div>
        <div class="circle-pattern" style="top: 64%"></div>
        <div class="circle-pattern circle-big"></div>
      </div>
      <div class="sand"></div>
    </div>
  </main>
  <footer style="text-align: center; padding: 10px; background: #004d40; color: white;">
    © 2026 Задание 1 — Аквариум | Создано для курса «Верстка и прототипирование сайтов»
  </footer>
</body>
</html>
