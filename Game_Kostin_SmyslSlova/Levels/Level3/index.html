<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Уровень 3 — Противоположности</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="large-header" class="large-header"></div>

<div class="container level-container">
    <div class="card level3-card">

        <div class="game-header">
            <div class="header-row">
                <button class="btn btn-small btn-ghost" onclick="Level3.quit()">← Выход</button>
                <span id="round-display" class="round-display">Раунд 1 / 5</span>
                <button class="btn btn-small btn-ghost" onclick="Level3.restart()">↺ Заново</button>
            </div>
            <div class="header-stats">
                <span class="stat-badge">⏱ <span id="timer-display">120</span>с</span>
                <span class="stat-badge">★ <span id="score-display">0</span></span>
            </div>
        </div>

        <div class="round-bar-wrap">
            <div class="round-bar-label">
                <span>Вопрос</span>
                <span id="round-timer-display">–</span>
            </div>
            <div class="round-bar-track">
                <div id="round-bar" class="round-bar-fill"></div>
            </div>
        </div>

        <div id="word-display" class="word-display">—</div>

        <div id="game-field" class="game-field"></div>

        <div class="event-hint">
            Двойной клик &nbsp;|&nbsp; Клавиши 1–4 &nbsp;|&nbsp; ↑↓←→ + Enter
        </div>

    </div>
</div>

<script src="../../script.js"></script>
<script src="script.js"></script>
</body>
</html>
